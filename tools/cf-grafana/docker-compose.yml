services:
  grafana:
    image: grafana/grafana:10.4.3
    ports:
      - "4741:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_INSTALL_PLUGINS: frser-sqlite-datasource 3.8.2
      GF_LOG_FILTERS: "plugin.frser-sqlite-datasource:debug"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

  ingest:
    image: python:3.12-slim
    command: >
      bash -c "
        while true; do
          python /app/ingest.py;
          sleep 300;
        done
      "
    environment:
      CF_STATS_OUT: /cf-stats-out
      CF_STATS_DB: /grafana-data/cf-stats.db
    volumes:
      - ./ingest.py:/app/ingest.py:ro
      - ../cf-stats/out:/cf-stats-out:ro
      - grafana_data:/grafana-data
    restart: unless-stopped
    depends_on:
      - grafana

volumes:
  grafana_data:
